<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructions</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Test Instructions</h1>
        <div style="text-align: left; margin-bottom: 2rem; line-height: 1.6;">
            <p>🚀 <strong>Rules of the Game:</strong></p>
            <ul>
                <li>Do NOT refresh the page.</li>
                <li>Do NOT use the back button.</li>
                <li>Only ONE attempt is allowed.</li>
                <li>Complete all 3 rounds to submit.</li>
                <li>Timer starts as soon as you click 'Start Test'.</li>
            </ul>
        </div>
        <button id="startBtn">Start Test</button>
    </div>

    <script>
        document.getElementById('startBtn').addEventListener('click', () => {
            const user = JSON.parse(localStorage.getItem('neon_test_user'));
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            
            // Set start time
            const startTime = Date.now();
            user.startTime = startTime;
            user.currentRound = 1;
            localStorage.setItem('neon_test_user', JSON.stringify(user));
            
            window.location.href = 'round1.html';
        });

        // Basic security: prevent back button
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };
    </script>
</body>
</html>
