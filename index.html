<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Test - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <div class="container">
        <h1>System Login</h1>
        <div class="input-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your name" required>
        </div>
        <div class="input-group">
            <label for="roll">Roll Number</label>
            <input type="text" id="roll" placeholder="Enter your roll number" required>
        </div>
        <button id="loginBtn">Enter System</button>
        <p id="errorMsg" style="color: var(--error-color); margin-top: 1rem; display: none;"></p>
    </div>

    <script src="js/firebase.js"></script>
    <script>
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const name = document.getElementById('name').value.trim();
            const roll = document.getElementById('roll').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            if (!name || !roll) {
                errorMsg.innerText = "Please fill all fields!";
                errorMsg.style.display = "block";
                return;
            }

            const userId = btoa(roll); // Simple unique ID based on roll
            
            try {
                const existingUser = await DB.getUser(userId);
                if (existingUser && existingUser.submitted) {
                    errorMsg.innerText = "Access Denied: You have already attempted the test.";
                    errorMsg.style.display = "block";
                    return;
                }

                // Save initial user data
                const userData = {
                    name: name,
                    roll: roll,
                    userId: userId,
                    submitted: false,
                    currentRound: 0
                };
                
                localStorage.setItem('neon_test_user', JSON.stringify(userData));
                await DB.saveUser(userId, userData);
                
                window.location.href = 'instructions.html';
            } catch (error) {
                console.error(error);
                errorMsg.innerText = "Database Error. Check console.";
                errorMsg.style.display = "block";
            }
        });
    </script>
</body>
</html>
