<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Results</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        .container { max-width: 1000px; }
        .controls { margin-bottom: 1rem; display: flex; gap: 10px; justify-content: center; }
        button.small { width: auto; padding: 5px 15px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin Dashboard</h1>
        <div class="controls">
            <button class="small" onclick="loadData()">Refresh Data</button>
            <button class="small" onclick="exportCSV()">Export CSV</button>
        </div>
        <div style="overflow-x: auto;">
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Name</th>
                        <th>Roll</th>
                        <th>Score</th>
                        <th>Time (s)</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/firebase.js"></script>
    <script>
        async function loadData() {
            const usersObj = await DB.getAllUsers();
            if (!usersObj) return;

            const users = Object.values(usersObj);
            
            // Ranking Logic: Sort by Score (Desc) then Time (Asc)
            users.sort((a, b) => {
                if (b.score !== a.score) {
                    return (b.score || 0) - (a.score || 0);
                }
                return (a.totalTime || 999999) - (b.totalTime || 999999);
            });

            const tbody = document.getElementById('resultsBody');
            tbody.innerHTML = '';

            users.forEach((user, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${user.name}</td>
                    <td>${user.roll}</td>
                    <td style="color: var(--neon-blue); font-weight: bold;">${user.score || 0}</td>
                    <td>${user.totalTime || 'N/A'}</td>
                    <td style="color: ${user.submitted ? '#00ff88' : '#ffaa00'}">
                        ${user.submitted ? 'Completed' : 'In Progress'}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function exportCSV() {
            let csv = 'Rank,Name,Roll,Score,Time(s),Status\n';
            const rows = document.querySelectorAll('table tr');
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].querySelectorAll('td');
                const rowData = Array.from(cols).map(c => c.innerText).join(',');
                csv += rowData + '\n';
            }
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', 'test_results.csv');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // Initial load
        loadData();
        // Auto refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
